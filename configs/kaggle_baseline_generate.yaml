inherits: configs/kaggle.yaml

evaluation:
  model_source: pretrained_bart
  output_path: /kaggle/working/reports/bart_base_generations.csv
  max_eval_examples: 20
  batch_size: 4
  max_new_tokens: 128
  num_beams: 4
  do_sample: false
  repetition_penalty: 1.2
  no_repeat_ngram_size: 3
  length_penalty: 1.0
  early_stopping: true
